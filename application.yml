server: # REST and WS server
  port: ${SERVER_PORT:2333}     # Railway sets SERVER_PORT=${{PORT}} for you
  address: 0.0.0.0
  http2:
    enabled: false

plugins:
  lavasrc:
    providers:
      # Search providers used when resolving Spotify/Apple/Deezer tracks.
      # %ISRC% is replaced with the track's ISRC for an exact match, %QUERY% with the title + artist.
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true        # enable Spotify source
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true         # enable LavaSrc's youtube helpers (works with the youtube-source plugin below)
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "US"
      playlistLoadLimit: 6  # x 100 tracks
      albumLoadLimit: 6     # x 50 tracks
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Clients used to fetch from YouTube. MUSIC + WEB + ANDROID gives broad coverage.
    clients:
      - MUSIC
      - WEB
      - WEBEMBEDDED
      - ANDROID_VR
      - TVHTML5EMBEDDED

lavalink:
  plugins:
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  server:
    password: "${LAVALINK_PASSWORD:youshallnotpass}"
    sources:
      # IMPORTANT: disable the built-in youtube source — the youtube-source plugin replaces it.
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
  level:
    root: INFO
    lavalink: INFO
